name: Release

concurrency:
  group: 'release-${{ github.ref }}'
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        type: choice
        default: none
        options:
          - none
          - patch
          - minor
          - major
          - alpha
          - beta
      build_windows:
        description: Windows (x64 & ARM64)
        type: boolean
        default: true
      build_macos:
        description: macOS (x64 & ARM64)
        type: boolean
        default: true
      build_linux:
        description: Linux (x64 & ARM64)
        type: boolean
        default: true
  push:
    tags:
      - v*

jobs:
  bump-version:
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.bump != 'none'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: '${{ steps.bump.outputs.version }}'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - uses: oven-sh/setup-bun@v1
      
      - id: bump
        name: Bump Version and Tag
        run: |
          echo "::group::Bumping Version"
          bun run version:bump ${{ github.event.inputs.bump }}
          AFTER=$(node -e "console.log(require('./vesta-launcher/src-tauri/tauri.conf.json').version)")

          if [ -z "$AFTER" ]; then
            echo "Error: Version bump failed - no version found after bump"
            exit 1
          fi

          echo "version=$AFTER" >> $GITHUB_OUTPUT
          echo "New Version: $AFTER"
          echo "::endgroup::"

          echo "::group::Committing and Tagging"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: bump version to $AFTER"
          git push
          git tag "v$AFTER"
          git push --tags
          echo "Pushed tag v$AFTER"
          echo "::endgroup::"

  build:
    needs: [bump-version]
    if: always() && (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped')
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'
            enabled: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_windows == 'true') }}
            name: Windows x64
            target: x86_64-pc-windows-msvc
          - platform: windows-11-arm
            args: '--target aarch64-pc-windows-msvc'
            enabled: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_windows == 'true') }}
            name: Windows ARM64
            target: aarch64-pc-windows-msvc
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            enabled: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_macos == 'true') }}
            name: macOS x64
            target: x86_64-apple-darwin
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            enabled: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_macos == 'true') }}
            name: macOS ARM64
            target: aarch64-apple-darwin
          - platform: ubuntu-latest
            args: '--target x86_64-unknown-linux-gnu'
            enabled: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_linux == 'true') }}
            name: Linux x64
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-24.04-arm
            args: '--target aarch64-unknown-linux-gnu'
            enabled: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_linux == 'true') }}
            name: Linux ARM64
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Determine checkout ref
        id: ref
        shell: bash
        run: |
          if [ "${{ needs.bump-version.result }}" = "success" ]; then
            REF="refs/tags/v${{ needs.bump-version.outputs.new_version }}"
          else
            REF="${{ github.ref }}"
          fi
          echo "ref=$REF" >> $GITHUB_OUTPUT
          
          echo "::group::Target Resolution"
          echo "Resolved Ref: $REF"
          echo "Platform: ${{ matrix.name }}"
          echo "Target Architecture: ${{ matrix.target }}"
          echo "::endgroup::"

      - uses: actions/checkout@v4
        if: matrix.enabled
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: Install dependencies (Linux only)
        if: matrix.enabled && startsWith(matrix.platform, 'ubuntu')
        shell: bash
        run: |
          echo "::group::Installing Linux Dependencies"
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev pkg-config xdg-utils
          echo "::endgroup::"

      - name: Cache Linux APT dependencies
        if: matrix.enabled && startsWith(matrix.platform, 'ubuntu')
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('**/tauri.conf.json') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Setup Node.js
        if: matrix.enabled
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Bun
        if: matrix.enabled && matrix.platform != 'windows-11-arm'
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Bun (Windows ARM64 - Node.js fallback)
        if: matrix.enabled && matrix.platform == 'windows-11-arm'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        if: matrix.enabled
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        if: matrix.enabled
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            vesta-launcher/src-tauri -> target
            crates/piston-lib -> target
          cache-all-crates: true

      - name: Install frontend dependencies
        if: matrix.enabled
        shell: bash
        run: |
          echo "::group::Installing Frontend Dependencies"
          cd vesta-launcher
          if [ "${{ matrix.platform }}" == "windows-11-arm" ]; then
            npm install --legacy-peer-deps
          else
            bun install
          fi
          echo "::endgroup::"

      - name: Build Tauri App
        if: matrix.enabled
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: |
          echo "::group::Building Tauri App for ${{ matrix.target }}"
          cd vesta-launcher
          
          if [ "${{ matrix.platform }}" == "macos-latest" ]; then
            bun run tauri build --target ${{ matrix.target }}
          elif [[ "${{ matrix.platform }}" == "ubuntu"* ]]; then
            bun run tauri build --target ${{ matrix.target }}
          elif [ "${{ matrix.platform }}" == "windows-11-arm" ]; then
            npx tauri build --target ${{ matrix.target }}
          else
            bun run tauri build --target ${{ matrix.target }}
          fi
          echo "::endgroup::"

      - name: Upload to Cloudflare R2
        if: matrix.enabled
        shell: bash
        run: |
          echo "::group::Configuring AWS CLI for R2"
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set region auto
          aws configure set default.s3.multipart_threshold 1024MB
          echo "::endgroup::"

          VERSION=$(node -e "console.log(require('./vesta-launcher/src-tauri/tauri.conf.json').version)")

          echo "::group::Uploading Files to Cloudflare R2"
          # Only find strictly valid artifact extensions to upload
          find target/${{ matrix.target }}/release/bundle/ -type f \( \
            -name "*.msi" -o \
            -name "*.msi.zip" -o \
            -name "*.dmg" -o \
            -name "*.deb" -o \
            -name "*.AppImage" -o \
            -name "*.app.tar.gz" -o \
            -name "*.sig" \
          \) -print0 | while IFS= read -r -d '' file; do
            filename=$(basename "$file")
            
            is_sig=false
            if [[ "$filename" == *.sig ]]; then
              is_sig=true
              base_file="${filename%.sig}"
            else
              base_file="$filename"
            fi
            
            ext="${base_file##*.}"
            target_name=""
            
            case "$ext" in
              msi)
                if [[ "${{ matrix.target }}" == *"aarch64"* ]]; then
                  target_name="Vesta_Launcher_${VERSION}_arm64.msi"
                else
                  target_name="Vesta_Launcher_${VERSION}_x64.msi"
                fi
                ;;
              zip)
                if [[ "$base_file" == *.msi.zip ]]; then
                  if [[ "${{ matrix.target }}" == *"aarch64"* ]]; then
                    target_name="Vesta_Launcher_${VERSION}_arm64.msi.zip"
                  else
                    target_name="Vesta_Launcher_${VERSION}_x64.msi.zip"
                  fi
                fi
                ;;
              dmg)
                if [[ "${{ matrix.target }}" == *"aarch64"* ]]; then
                  target_name="Vesta_Launcher_${VERSION}_aarch64.dmg"
                else
                  target_name="Vesta_Launcher_${VERSION}_x64.dmg"
                fi
                ;;
              deb)
                if [[ "${{ matrix.target }}" == *"aarch64"* ]]; then
                  target_name="vesta-launcher_${VERSION}_arm64.deb"
                else
                  target_name="vesta-launcher_${VERSION}_amd64.deb"
                fi
                ;;
              AppImage)
                target_name="Vesta_Launcher_${VERSION}_x86_64.AppImage"
                ;;
              gz)
                if [[ "$base_file" == *.tar.gz ]]; then
                  if [[ "${{ matrix.target }}" == *"aarch64"* ]]; then
                    target_name="Vesta_Launcher_${VERSION}_aarch64.app.tar.gz"
                  else
                    target_name="Vesta_Launcher_${VERSION}_x64.app.tar.gz"
                  fi
                fi
                ;;
            esac
            
            if [ -n "$target_name" ]; then
              if [ "$is_sig" = true ]; then target_name="$target_name.sig"; fi
              echo "Uploading $filename as $target_name"
              aws s3 cp "$file" "s3://vesta-project/launcher/releases/$VERSION/$target_name" --endpoint-url https://b30108be91a7d16a9ae5d6c87838cec0.r2.cloudflarestorage.com
            else
              echo "Uploading $filename (unknown format)"
              aws s3 cp "$file" "s3://vesta-project/launcher/releases/$VERSION/$filename" --endpoint-url https://b30108be91a7d16a9ae5d6c87838cec0.r2.cloudflarestorage.com
            fi
          done
          echo "::endgroup::"

      - name: Upload build artifacts
        if: matrix.enabled
        uses: actions/upload-artifact@v4
        with:
          name: 'build-artifacts-${{ matrix.name }}'
          # Explicitly filter ONLY the bundled files so we don't grab 200+ raw macOS .app folder contents
          path: |
            target/${{ matrix.target }}/release/bundle/**/*.msi
            target/${{ matrix.target }}/release/bundle/**/*.msi.zip
            target/${{ matrix.target }}/release/bundle/**/*.dmg
            target/${{ matrix.target }}/release/bundle/**/*.deb
            target/${{ matrix.target }}/release/bundle/**/*.AppImage
            target/${{ matrix.target }}/release/bundle/**/*.AppImage.tar.gz
            target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            target/${{ matrix.target }}/release/bundle/**/*.sig
          if-no-files-found: error

  generate-manifest:
    needs: [build, bump-version]
    if: always() && (needs.build.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate R2 secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.R2_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.R2_SECRET_ACCESS_KEY }}" ]; then
            echo "R2 secrets not configured, skipping manifest generation"
            exit 0
          fi
          
      - name: Configure AWS for R2
        run: |
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set region auto
          
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          elif [ "${{ needs.bump-version.result }}" = "success" ]; then
            VERSION="${{ needs.bump-version.outputs.new_version }}"
          else
            VERSION=$(node -e "console.log(require('./vesta-launcher/src-tauri/tauri.conf.json').version)")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Generate and upload latest.json
        run: |
          echo "::group::Generating latest.json manifest"
          VERSION="${{ steps.version.outputs.version }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES="Automatic release"

          FILES=$(aws s3 ls s3://vesta-project/launcher/releases/$VERSION/ --endpoint-url https://b30108be91a7d16a9ae5d6c87838cec0.r2.cloudflarestorage.com | awk '{print $4}')
          
          # Use jq to safely construct the JSON object
          JSON_DATA="{}"
          
          for file in $FILES; do
            if [[ "$file" == *.sig ]]; then continue; fi

            PLATFORM=""
            IS_INSTALLER=false
            
            case "$file" in
              # Web Installers (IS_INSTALLER=true)
              Vesta_Launcher_${VERSION}_x64.msi) PLATFORM="windows-x86_64"; IS_INSTALLER=true ;;
              Vesta_Launcher_${VERSION}_arm64.msi) PLATFORM="windows-aarch64"; IS_INSTALLER=true ;;
              Vesta_Launcher_${VERSION}_x64.dmg) PLATFORM="darwin-x86_64"; IS_INSTALLER=true ;;
              Vesta_Launcher_${VERSION}_aarch64.dmg) PLATFORM="darwin-aarch64"; IS_INSTALLER=true ;;
              vesta-launcher_${VERSION}_arm64.deb) PLATFORM="linux-aarch64"; IS_INSTALLER=true ;;
              vesta-launcher_${VERSION}_amd64.deb) PLATFORM="linux-x86_64"; IS_INSTALLER=true ;;

              # Updater Artifacts (IS_INSTALLER=false)
              Vesta_Launcher_${VERSION}_x64.msi.zip) PLATFORM="windows-x86_64"; IS_INSTALLER=false ;;
              Vesta_Launcher_${VERSION}_arm64.msi.zip) PLATFORM="windows-aarch64"; IS_INSTALLER=false ;;
              Vesta_Launcher_${VERSION}_x64.app.tar.gz) PLATFORM="darwin-x86_64"; IS_INSTALLER=false ;;
              Vesta_Launcher_${VERSION}_aarch64.app.tar.gz) PLATFORM="darwin-aarch64"; IS_INSTALLER=false ;;
              Vesta_Launcher_${VERSION}_x86_64.AppImage) PLATFORM="linux-x86_64"; IS_INSTALLER=false ;;
            esac

            if [ -n "$PLATFORM" ] && [ "$IS_INSTALLER" = false ]; then
              SIG_FILE="$file.sig"
              SIGNATURE_RAW=$(aws s3 cp "s3://vesta-project/launcher/releases/$VERSION/$SIG_FILE" - --endpoint-url https://b30108be91a7d16a9ae5d6c87838cec0.r2.cloudflarestorage.com 2>/dev/null || echo "")
              
              if echo "$SIGNATURE_RAW" | grep -q "untrusted comment"; then
                SIGNATURE=$(echo "$SIGNATURE_RAW" | sed -n '2p')
              else
                SIGNATURE="$SIGNATURE_RAW"
              fi
              
              JSON_DATA=$(echo "$JSON_DATA" | jq --arg plat "$PLATFORM" \
                --arg url "https://r2.vestalauncher.com.r2.dev/launcher/releases/$VERSION/$file" \
                --arg sig "$SIGNATURE" \
                '.[$plat] = {"url": $url, "signature": $sig}')
            fi
          done

          jq -n \
            --arg v "$VERSION" \
            --arg n "$NOTES" \
            --arg p "$PUB_DATE" \
            --argjson platforms "$JSON_DATA" \
            '{version: $v, notes: $n, pub_date: $p, platforms: $platforms}' > latest.json

          cat latest.json
          echo "::endgroup::"
          
          echo "Uploading latest.json to R2"
          aws s3 cp latest.json s3://vesta-project/launcher/releases/ --endpoint-url https://b30108be91a7d16a9ae5d6c87838cec0.r2.cloudflarestorage.com

  create-github-release:
    needs: [build, generate-manifest, bump-version]
    if: always() && needs.build.result == 'success' && needs.generate-manifest.result == 'success' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          elif [ "${{ needs.bump-version.result }}" = "success" ]; then
            VERSION="${{ needs.bump-version.outputs.new_version }}"
          else
            VERSION=$(node -e "console.log(require('./vesta-launcher/src-tauri/tauri.conf.json').version)")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          
      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          echo "::group::Generating Changelog"
          CURRENT_TAG="v${{ steps.version.outputs.version }}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | head -2 | tail -1 || echo "")

          echo "## Changelog" > changelog.md
          echo "" >> changelog.md

          if [ -n "$PREVIOUS_TAG" ] && git rev-parse "$CURRENT_TAG" >/dev/null 2>&1; then
            COMMIT_COUNT=$(git rev-list --count ${PREVIOUS_TAG}..${CURRENT_TAG} 2>/dev/null || echo "0")
            if [ "$COMMIT_COUNT" -gt 0 ]; then
              git log --pretty=format:"- %s (%h)" --no-merges --grep="chore: bump version" --invert-grep ${PREVIOUS_TAG}..${CURRENT_TAG} >> changelog.md 2>/dev/null || echo "- Release notes" >> changelog.md
            else
              echo "- No changes since last release" >> changelog.md
            fi
          else
            echo "- Initial release" >> changelog.md
          fi

          if [ ! -s changelog.md ]; then echo "- No changes or initial release" > changelog.md; fi

          cat changelog.md
          echo "::endgroup::"

          # Use dynamic EOF to avoid conflicts
          EOF_ID=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64 | tr -dc 'a-zA-Z0-9')
          {
            echo "changelog<<$EOF_ID"
            cat changelog.md
            echo "$EOF_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Create or Update GitHub Release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'v${{ steps.version.outputs.version }}'
          name: 'Vesta Launcher v${{ steps.version.outputs.version }}'
          body: |
            ## Vesta Launcher v${{ steps.version.outputs.version }}

            Automatic release build for Vesta Launcher.

            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}

      - name: Upload Release Artifacts (Clobber existing)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "::group::Uploading Release Assets to GitHub"
          
          # Enable extended pattern matching in bash
          shopt -s globstar extglob nullglob
          
          # Collect ONLY our compiled assets (ignores directories and source files)
          FILES=(artifacts/**/*.@(msi|zip|dmg|deb|AppImage|tar.gz|sig))
          
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No matching artifacts found to upload!"
            exit 1
          fi

          echo "Found ${#FILES[@]} files to upload:"
          printf '  - %s\n' "${FILES[@]}"
          
          # Using the official GitHub CLI to upload handles 404s and overwrites (--clobber) natively and gracefully!
          gh release upload "v${{ steps.version.outputs.version }}" "${FILES[@]}" --clobber
          
          echo "::endgroup::"