name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.10
  RUST_TOOLCHAIN: 1.96.0

jobs:
  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install frontend dependencies
        working-directory: vesta-launcher
        run: bun install --frozen-lockfile

      - name: Run frontend tests
        working-directory: vesta-launcher
        run: bun run test -- --run

      - name: Build frontend
        working-directory: vesta-launcher
        run: bun run build

  rust:
    name: Rust format and tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            xdg-utils

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt
          rustup override set "$RUST_TOOLCHAIN"
          rustc --version
          cargo --version

      - name: Cache Rust dependencies
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-${{ env.RUST_TOOLCHAIN }}-

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Rust tests
        run: cargo test --workspace --locked --no-fail-fast

  workflow:
    name: Workflow validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ACTIONLINT_VERSION: 1.7.12
      ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install actionlint
        run: |
          archive="$RUNNER_TEMP/actionlint.tar.gz"
          curl --fail --location --silent --show-error \
            --output "$archive" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  ${archive}" | sha256sum --check
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP" actionlint

      - name: Validate GitHub Actions workflows
        run: '"$RUNNER_TEMP/actionlint" -color -shellcheck=""'

  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install root tooling
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Install frontend dependencies
        working-directory: vesta-launcher
        run: bun install --frozen-lockfile

      - name: Check TypeScript
        working-directory: vesta-launcher
        run: bun run typecheck

      - name: Check frontend quality
        working-directory: vesta-launcher
        run: bun run check

  rust-quality:
    name: Rust Clippy (advisory)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            xdg-utils

      - name: Set up Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy
          rustup override set "$RUST_TOOLCHAIN"

      - name: Run strict Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  required:
    name: Required
    if: always()
    needs:
      - frontend
      - frontend-quality
      - rust
      - workflow
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Confirm required jobs passed
        env:
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          FRONTEND_QUALITY_RESULT: ${{ needs.frontend-quality.result }}
          RUST_RESULT: ${{ needs.rust.result }}
          WORKFLOW_RESULT: ${{ needs.workflow.result }}
        run: |
          if [[ "$FRONTEND_RESULT" != "success" ||
                "$FRONTEND_QUALITY_RESULT" != "success" ||
                "$RUST_RESULT" != "success" ||
                "$WORKFLOW_RESULT" != "success" ]]; then
            echo "A required CI job did not pass."
            echo "frontend=$FRONTEND_RESULT"
            echo "frontend-quality=$FRONTEND_QUALITY_RESULT"
            echo "rust=$RUST_RESULT"
            echo "workflow=$WORKFLOW_RESULT"
            exit 1
          fi
